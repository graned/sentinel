name: TypeScript CI

# Only runs when TypeScript source changes.
# Rust / Cargo changes do NOT trigger this workflow.
#
# Dependency chain:  sentinel-auth-sdk  →  sentinel-auth-react  →  sentinel-ui
#
# Each job builds/checks its own package and uploads the compiled dist/ as an
# artifact so downstream jobs can install the package correctly.
on:
  push:
    branches: [main]
    paths:
      - "packages/sentinel-auth-sdk/**"
      - "packages/sentinel-auth-react/**"
      - "apps/sentinel-ui/**"
  pull_request:
    paths:
      - "packages/sentinel-auth-sdk/**"
      - "packages/sentinel-auth-react/**"
      - "apps/sentinel-ui/**"

jobs:
  # ── sentinel-auth-sdk ─────────────────────────────────────────────────────
  sdk:
    name: SDK — build & typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sentinel-auth-sdk

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sentinel-auth-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Upload dist/ so auth-react and ui jobs can consume the compiled package.
      - uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: packages/sentinel-auth-sdk/dist
          retention-days: 1

  # ── sentinel-auth-react ───────────────────────────────────────────────────
  auth-react:
    name: auth-react — build & typecheck
    runs-on: ubuntu-latest
    needs: sdk
    defaults:
      run:
        working-directory: packages/sentinel-auth-react

    steps:
      - uses: actions/checkout@v4

      # Restore the sdk dist/ built in the previous job so that
      # `npm install` (file: dependency) finds the compiled output.
      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sentinel-auth-sdk/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sentinel-auth-react/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: auth-react-dist
          path: packages/sentinel-auth-react/dist
          retention-days: 1

  # ── sentinel-ui ───────────────────────────────────────────────────────────
  ui:
    name: UI — typecheck & build
    runs-on: ubuntu-latest
    needs: [sdk, auth-react]
    defaults:
      run:
        working-directory: apps/sentinel-ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/sentinel-auth-sdk/dist

      - uses: actions/download-artifact@v4
        with:
          name: auth-react-dist
          path: packages/sentinel-auth-react/dist

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/sentinel-ui/package-lock.json

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:9000
