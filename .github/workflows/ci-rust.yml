name: Rust CI

# Only runs when Rust source changes.
# UI / SDK / auth-react changes do NOT trigger this workflow.
on:
  push:
    branches: [main]
    paths:
      - "apps/sentinel-core/**"
      - "packages/sentinel-policy-engine/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    paths:
      - "apps/sentinel-core/**"
      - "packages/sentinel-policy-engine/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Format + Clippy ────────────────────────────────────────────────────────
  lint:
    name: Format & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Integration tests ──────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the production server image and load it into the local daemon.
      # On cache hit (no source changes) this completes in ~20 s instead of
      # 6-8 min; the sentinel-core service in compose starts the binary
      # directly with no compilation step.
      - name: Build sentinel-core server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/sentinel-core/Dockerfile
          push: false
          load: true
          tags: sentinel-core:ci
          cache-from: type=gha,scope=sentinel-core-prod
          cache-to: type=gha,mode=max,scope=sentinel-core-prod

      # Build the dev toolchain image used by the test-runner service.
      # Caches the apt + cargo-install layers so only the test compilation
      # itself is left on subsequent runs.
      - name: Build test-runner dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/sentinel-core/Dockerfile.dev
          push: false
          load: true
          tags: sentinel-core-dev:ci
          cache-from: type=gha,scope=sentinel-core-dev
          cache-to: type=gha,mode=max,scope=sentinel-core-dev

      - name: Run tests via Docker Compose
        env:
          SENTINEL_CORE_IMAGE: sentinel-core:ci
          SENTINEL_CORE_DEV_IMAGE: sentinel-core-dev:ci
        run: |
          docker compose -f docker-compose.ci.yml up \
            --exit-code-from test-runner \
            --abort-on-container-exit

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down --volumes
