name: Rust CI

# Triggers:
#   pull_request (opened/synchronize/reopened) — NO path filter intentionally.
#     Every PR event must reach changes + build-core so that PRs with zero
#     Rust-file changes still get a PR-{n} retag, and CI always has a
#     SENTINEL_CORE_IMAGE to run against.
#   push to main — path-filtered to Rust sources only (TS-only pushes skip
#     this workflow entirely).
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths:
      - "apps/sentinel-core/**"
      - "packages/sentinel-policy-engine/**"
      - "Cargo.toml"
      - "Cargo.lock"

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository_owner }}/sentinel-core
  MIGRATE_IMAGE: ghcr.io/${{ github.repository_owner }}/sentinel-migrate:latest

# Cancel any in-progress run for the same branch/PR when a new commit arrives.
# On main, runs queue rather than cancel (cancel-in-progress: false) so every
# merge is always tested and tagged.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Detect Rust file changes ───────────────────────────────────────────────
  changes:
    name: Detect Rust changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'apps/sentinel-core/**'
              - 'packages/sentinel-policy-engine/**'
              - 'Cargo.toml'
              - 'Cargo.lock'

  # ── Format + Clippy ────────────────────────────────────────────────────────
  # Runs in parallel with build-core. Only fires when Rust files are in the
  # delta (or on a direct push to main, which is always Rust-filtered).
  lint:
    name: Format & Clippy
    needs: changes
    if: needs.changes.outputs.rust == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Build / retag sentinel-core image ─────────────────────────────────────
  # On PR events (regardless of what files changed):
  #   • Rust changed  → tango dance --event commit (full build, push sha-{short})
  #                     + tango dance --event pull-request (adds pr-{n} tag)
  #   • No Rust change → tango promote latest → pr-{n}  (zero layer transfer)
  #     If latest doesn't exist yet (first-ever run) fall back to tango dance.
  #
  # On push to main (direct push / squash-and-merge without PR):
  #   → tango dance --event commit (build sha-{short})
  #   → tango promote sha → latest
  #   No `main` tag — redundant with latest.
  #
  # PR merge promotion (sha-{merge_commit} + latest, no rebuild) is handled
  # by build-images.yml's promote job using tango promote.
  #
  # Outputs image_tag consumed by the test job so there is no race condition.
  build-core:
    name: Build / retag sentinel-core
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tango
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tango
          git: https://github.com/graned/tango-cli

      # ── PR, no Rust changes: retag latest as pr-{n} ───────────────────────
      - name: Retag latest → pr-${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request' && needs.changes.outputs.rust != 'true'
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMG="${{ env.IMAGE }}"
          PR="${{ github.event.pull_request.number }}"
          if docker buildx imagetools inspect "${IMG}:latest" >/dev/null 2>&1; then
            echo "Retagging ${IMG}:latest → ${IMG}:pr-${PR}"
            tango promote \
              --package sentinel-core \
              --source "${IMG}:latest" \
              --target-tag "pr-${PR}"
          else
            echo "No latest tag found — flagging for full build fallback"
            echo "NEEDS_BUILD=true" >> "$GITHUB_ENV"
          fi

      # ── PR with Rust changes (or latest-missing fallback): tango dance ─────
      - name: Build and push pr-${{ github.event.pull_request.number }}
        if: |
          github.event_name == 'pull_request' &&
          (needs.changes.outputs.rust == 'true' || env.NEEDS_BUILD == 'true')
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango dance \
            --package sentinel-core \
            --event pull-request \
            --sha ${{ github.event.pull_request.head.sha }} \
            --pr ${{ github.event.pull_request.number }}

      # ── Direct push to main: build sha tag, then promote to latest ──────────
      # Uses --event commit so tango never emits the redundant `main` tag.
      # A separate tango promote step adds `latest` explicitly.
      - name: Build and push sha
        if: github.event_name == 'push'
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango dance \
            --package sentinel-core \
            --event commit \
            --sha ${{ github.sha }}

      - name: Promote sha → latest
        if: github.event_name == 'push'
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango promote \
            --package sentinel-core \
            --sha ${{ github.sha }} \
            --target-tag latest

      # ── Emit the tag for downstream jobs ──────────────────────────────────
      - name: Set image_tag output
        id: set-tag
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image_tag=${{ env.IMAGE }}:pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${{ env.IMAGE }}:sha-${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
          fi

  # ── Integration tests ──────────────────────────────────────────────────────
  # Depends on build-core so the image is guaranteed to exist before tests run.
  # Uses the image_tag output from build-core — no polling, no race condition.
  test:
    name: Integration Tests
    needs: [build-core]
    if: needs.build-core.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull sentinel-core image
        run: docker pull ${{ needs.build-core.outputs.image_tag }}

      # Build migrate image once; skip the build entirely if the image
      # already exists in GHCR (diesel_cli compile takes ~5 min).
      - name: Build or pull migrate image
        run: |
          IMG="${{ env.MIGRATE_IMAGE }}"
          if docker buildx imagetools inspect "${IMG}" >/dev/null 2>&1; then
            echo "Migrate image already exists — pulling ${IMG}"
            docker pull "${IMG}"
          else
            echo "Migrate image not found — building and pushing ${IMG}"
            docker buildx build \
              --push \
              --cache-from type=gha,scope=sentinel-migrate \
              --cache-to type=gha,mode=max,scope=sentinel-migrate \
              -t "${IMG}" \
              -f apps/sentinel-core/Dockerfile.migrate \
              .
            docker pull "${IMG}"
          fi

      # Start postgres → migrate (one-shot) → sentinel-core in detached mode.
      # Poll the Docker healthcheck status explicitly so we get container logs
      # on failure instead of an opaque --wait error.
      - name: Start infrastructure
        env:
          SENTINEL_CORE_IMAGE: ${{ needs.build-core.outputs.image_tag }}
          SENTINEL_MIGRATE_IMAGE: ${{ env.MIGRATE_IMAGE }}
          SENTINEL_CORE_DEV_IMAGE: sentinel-core-dev:ci
        run: |
          # Start only infrastructure — test-runner is run separately below.
          # Starting all services would make compose error immediately when
          # sentinel-core exits (test-runner dep fails) before the poll loop runs.
          docker compose -f docker-compose.ci.yml up -d sentinel-core || {
            echo "=== docker compose up failed — dumping all logs ==="
            docker compose -f docker-compose.ci.yml logs
            exit 1
          }

          echo "Waiting for sentinel-core to become healthy..."
          for i in $(seq 1 36); do
            CID=$(docker compose -f docker-compose.ci.yml ps -q sentinel-core)
            if [ -z "$CID" ]; then
              echo "sentinel-core container not found — showing all logs:"
              docker compose -f docker-compose.ci.yml logs
              exit 1
            fi
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CID" 2>/dev/null)
            STATE=$(docker inspect --format='{{.State.Status}}'         "$CID" 2>/dev/null)
            echo "  [$i/36] state=$STATE health=$HEALTH"
            if [ "$HEALTH" = "healthy" ]; then
              echo "sentinel-core is healthy"
              exit 0
            fi
            if [ "$STATE" = "exited" ] || [ "$STATE" = "dead" ]; then
              echo "sentinel-core exited unexpectedly — logs:"
              docker compose -f docker-compose.ci.yml logs sentinel-core
              exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for sentinel-core — logs:"
          docker compose -f docker-compose.ci.yml logs sentinel-core
          exit 1

      - name: Run integration tests
        env:
          SENTINEL_CORE_IMAGE: ${{ needs.build-core.outputs.image_tag }}
          SENTINEL_MIGRATE_IMAGE: ${{ env.MIGRATE_IMAGE }}
          SENTINEL_CORE_DEV_IMAGE: sentinel-core-dev:ci
        run: |
          docker compose -f docker-compose.ci.yml run --rm test-runner

      - name: Tear down
        if: always()
        env:
          SENTINEL_CORE_IMAGE: ${{ needs.build-core.outputs.image_tag }}
          SENTINEL_MIGRATE_IMAGE: ${{ env.MIGRATE_IMAGE }}
          SENTINEL_CORE_DEV_IMAGE: sentinel-core-dev:ci
        run: docker compose -f docker-compose.ci.yml down --volumes
