name: Build & Push Docker Images

# Builds production Docker images when relevant source files change.
# Images are tagged with the commit SHA and (on main) `latest`.
# Pull requests build but do not push — cache is still populated for speed.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Detect which parts of the codebase changed ────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'apps/sentinel-core/**'
              - 'packages/sentinel-policy-engine/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            typescript:
              - 'apps/sentinel-ui/**'
              - 'packages/sentinel-auth-sdk/**'
              - 'packages/sentinel-auth-react/**'

  # ── sentinel-core ─────────────────────────────────────────────────────────
  build-core:
    name: Build sentinel-core
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/sentinel-core
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/sentinel-core/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sentinel-core-prod
          cache-to: type=gha,mode=max,scope=sentinel-core-prod

  # ── sentinel-ui ───────────────────────────────────────────────────────────
  build-ui:
    name: Build sentinel-ui
    needs: changes
    if: needs.changes.outputs.typescript == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/sentinel-ui
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/sentinel-ui/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=sentinel-ui
          cache-to: type=gha,mode=max,scope=sentinel-ui
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL || '' }}
