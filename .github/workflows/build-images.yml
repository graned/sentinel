name: Build & Push Docker Images

# Triggers:
#   pull_request (opened/synchronize/reopened/closed) — NO path filter.
#     opened/synchronize/reopened: build or retag sentinel-ui as pr-{n}.
#     closed + merged: promote pr-{n} → sha-{short} + main + latest for BOTH
#       sentinel-core and sentinel-ui, then delete the pr-{n} tags.
#     (ci-rust.yml owns the sentinel-core build; this workflow owns promotion
#      of both images because only pull_request.closed carries the PR number.)
#   push to main — TS path-filtered. Builds sentinel-ui directly.
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  push:
    branches: [main]
    paths:
      - "apps/sentinel-ui/**"
      - "packages/sentinel-auth-sdk/**"
      - "packages/sentinel-auth-react/**"

env:
  REGISTRY: ghcr.io
  IMAGE_CORE: ghcr.io/${{ github.repository_owner }}/sentinel-core
  IMAGE_UI: ghcr.io/${{ github.repository_owner }}/sentinel-ui

# Cancel in-progress runs on PRs when a new commit arrives.
# The promote job (closed+merged) is not affected because it runs once
# per merge and github.ref is the PR branch, not main.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Detect TypeScript file changes ────────────────────────────────────────
  # Skipped on closed events — the promote job handles those unconditionally.
  changes:
    name: Detect TS changes
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      typescript: ${{ steps.filter.outputs.typescript }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            typescript:
              - 'apps/sentinel-ui/**'
              - 'packages/sentinel-auth-sdk/**'
              - 'packages/sentinel-auth-react/**'

  # ── Build / retag sentinel-ui image ───────────────────────────────────────
  # On PR events (opened/synchronize/reopened):
  #   • TS changed   → tango dance (full build, push pr-{n} + sha-{short})
  #   • No TS change → tango promote latest → pr-{n}  (zero layer transfer)
  #     If latest doesn't exist yet fall back to tango dance (full build).
  #
  # On push to main:
  #   → tango dance (full build, push sha-{short} + main + latest)
  build-ui:
    name: Build / retag sentinel-ui
    needs: changes
    if: github.event.action != 'closed' && needs.changes.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tango
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tango
          git: https://github.com/graned/tango-cli

      # ── PR, no TS changes: retag latest as pr-{n} ─────────────────────────
      - name: Retag latest → pr-${{ github.event.pull_request.number }}
        if: github.event_name == 'pull_request' && needs.changes.outputs.typescript != 'true'
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IMG="${{ env.IMAGE_UI }}"
          PR="${{ github.event.pull_request.number }}"
          if docker buildx imagetools inspect "${IMG}:latest" >/dev/null 2>&1; then
            echo "Retagging ${IMG}:latest → ${IMG}:pr-${PR}"
            tango promote \
              --package sentinel-ui \
              --source "${IMG}:latest" \
              --target-tag "pr-${PR}"
          else
            echo "No latest tag found — flagging for full build fallback"
            echo "NEEDS_BUILD=true" >> "$GITHUB_ENV"
          fi

      # ── PR with TS changes (or latest-missing fallback): tango dance ───────
      - name: Build and push pr-${{ github.event.pull_request.number }}
        if: |
          github.event_name == 'pull_request' &&
          (needs.changes.outputs.typescript == 'true' || env.NEEDS_BUILD == 'true')
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango dance \
            --package sentinel-ui \
            --event pull-request \
            --sha ${{ github.event.pull_request.head.sha }} \
            --pr ${{ github.event.pull_request.number }} \
            --build-arg VITE_API_URL=${{ vars.VITE_API_URL || '' }}

      # ── Direct push to main: tango dance (build + tag main + latest) ───────
      - name: Build and push sha + main + latest
        if: github.event_name == 'push'
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango dance \
            --package sentinel-ui \
            --event merge \
            --sha ${{ github.sha }} \
            --build-arg VITE_API_URL=${{ vars.VITE_API_URL || '' }}

  # ── Promote PR images on merge ─────────────────────────────────────────────
  # Fires only when a PR is merged into main.
  #
  # Uses github.event.pull_request.head.sha — the SHA that was actually built
  # during PR review — to correctly locate and promote the existing image.
  # This fixes the original bug where merge_commit_sha (a different SHA) was
  # used, causing the promote to reference an image that was never built.
  #
  # For each image (sentinel-core + sentinel-ui):
  #   1. tango dance --event merge repoints sha-{pr_head_short} → main + latest
  #      using digest reuse — no layers are re-pushed.
  #   2. gh api DELETE removes the stale pr-{n} tag from GHCR.
  #      TODO: replace gh api delete with a tango native command once
  #      tango adds delete/cleanup support (no such command exists yet).
  promote:
    name: Promote PR images → main
    if: github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tango
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tango
          git: https://github.com/graned/tango-cli

      - name: Promote sentinel-core
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.event.pull_request.head.sha }}"
          SHORT="${SHA:0:12}"
          # Only promote if a sha tag was actually built during the PR.
          # When a PR has no Rust changes ci-rust.yml only creates pr-{n} via
          # tango promote (no rebuild), so sha-{short} never exists and
          # main/latest already point to the correct image — nothing to do.
          if docker buildx imagetools inspect "${{ env.IMAGE_CORE }}:sha-${SHORT}" >/dev/null 2>&1; then
            tango dance \
              --package sentinel-core \
              --event merge \
              --sha "${SHA}"
          else
            echo "sentinel-core:sha-${SHORT} not found — PR had no Rust changes, skipping promote (main/latest already current)"
          fi

      - name: Promote sentinel-ui
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango dance \
            --package sentinel-ui \
            --event merge \
            --sha ${{ github.event.pull_request.head.sha }}

      # TODO: replace with tango native cleanup once tango adds delete support
      - name: Delete PR tags from GHCR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR="${{ github.event.pull_request.number }}"
          for PACKAGE in sentinel-core sentinel-ui; do
            VERSION_ID=$(gh api "/user/packages/container/${PACKAGE}/versions" \
              --paginate \
              --jq ".[] | select(.metadata.container.tags[] == \"pr-${PR}\") | .id" \
              2>/dev/null | head -1)
            if [ -n "$VERSION_ID" ]; then
              gh api --method DELETE "/user/packages/container/${PACKAGE}/versions/${VERSION_ID}"
              echo "Deleted ${PACKAGE}:pr-${PR} (version ${VERSION_ID})"
            else
              echo "Tag pr-${PR} not found in ${PACKAGE} — skipping delete"
            fi
          done
