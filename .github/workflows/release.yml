name: Release Docker Images

# Triggers when a release tag (e.g. v1.0.0) is pushed.
# No rebuild — promotes the already-tested sha-{commit} images to the
# release version tag for both sentinel-core and sentinel-ui.
#
# "Most recently deployed" is deduced from the commit the tag points to:
#   github.sha → sha-{short} → existing GHCR image built when that
#   commit was merged to main via the normal CI pipeline.
on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_CORE: ghcr.io/${{ github.repository_owner }}/sentinel-core
  IMAGE_UI: ghcr.io/${{ github.repository_owner }}/sentinel-ui

jobs:
  release:
    name: Promote images → ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20   # need history to walk ancestors for sha-image lookup

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tango
        uses: baptiste0928/cargo-install@v3
        with:
          crate: tango
          git: https://github.com/graned/tango-cli

      # Locate the SHA whose built images should be promoted to the release tag.
      #
      # Happy path: the tagged commit itself has sha-{short} images in GHCR
      # (the normal case after a source-code merge to main).
      #
      # Fallback: if no images exist for the tagged commit, walk back through
      # the last 20 ancestors to find the nearest one that was fully built.
      # This handles the case where the tag was placed on a commit that only
      # changed non-source files (e.g. workflow files, docs, scripts) — the
      # CI path filter skips those commits intentionally, so no new image is
      # built, but the previous application image is still correct.
      #
      # Fails with a clear message if no built image pair is found at all.
      - name: Find promotable SHA
        id: find-sha
        run: |
          check_images() {
            local sha="$1" short="${1:0:12}"
            docker buildx imagetools inspect "${{ env.IMAGE_CORE }}:sha-${short}" >/dev/null 2>&1 && \
            docker buildx imagetools inspect "${{ env.IMAGE_UI }}:sha-${short}" >/dev/null 2>&1
          }

          SHORT="${GITHUB_SHA:0:12}"
          if check_images "$GITHUB_SHA"; then
            echo "Both sha-${SHORT} images confirmed — proceeding with promotion"
            echo "promote_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "sha-${SHORT} not found. The tagged commit likely only changed"
          echo "non-source files (workflows, scripts, docs). Searching ancestors..."

          while IFS= read -r ancestor; do
            a_short="${ancestor:0:12}"
            if check_images "$ancestor"; then
              echo "Found built images at ancestor sha-${a_short} — promoting those"
              echo "promote_sha=${ancestor}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done < <(git log --format='%H' -20 HEAD^)

          echo "ERROR: No built sha image pair found in the last 20 commits."
          echo "Ensure the application was built and pushed via the normal CI pipeline."
          exit 1

      - name: Promote sentinel-core → ${{ github.ref_name }}
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango promote \
            --package sentinel-core \
            --sha ${{ steps.find-sha.outputs.promote_sha }} \
            --target-tag "${{ github.ref_name }}"

      - name: Promote sentinel-ui → ${{ github.ref_name }}
        env:
          TANGO_REGISTRY_HOST: ghcr.io
          TANGO_REGISTRY_NAMESPACE: ${{ github.repository_owner }}
          TANGO_REGISTRY_USER: ${{ github.actor }}
          TANGO_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tango promote \
            --package sentinel-ui \
            --sha ${{ steps.find-sha.outputs.promote_sha }} \
            --target-tag "${{ github.ref_name }}"
