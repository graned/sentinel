server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all unmatched paths serve index.html so the React router
    # handles client-side navigation.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Aggressively cache hashed static assets (JS, CSS bundles).
    # Vite adds content hashes to filenames so these never go stale.
    location ~* \.(js|css|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Short-lived cache for images and SVGs.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Never cache the entry point — the browser must always fetch the latest
    # HTML so it picks up new asset hashes after a deployment.
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/xml;
    gzip_min_length 1024;

    # Hide the nginx version string from response headers.
    server_tokens off;
}
