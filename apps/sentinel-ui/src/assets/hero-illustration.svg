<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" fill="none">
  <defs>
    <!-- Radial glow for the lock/shield -->
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <!-- Radial glow at base -->
    <radialGradient id="baseGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <!-- Tower top face gradient -->
    <linearGradient id="towerTopFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f2340"/>
    </linearGradient>
    <!-- Tower front face gradient -->
    <linearGradient id="towerFrontFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#172d50"/>
      <stop offset="100%" stop-color="#0b1a30"/>
    </linearGradient>
    <!-- Tower side face gradient -->
    <linearGradient id="towerSideFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0e2040"/>
      <stop offset="100%" stop-color="#091628"/>
    </linearGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Platform gradient -->
    <linearGradient id="platformGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3560"/>
      <stop offset="100%" stop-color="#0d1f3c"/>
    </linearGradient>
    <!-- Circuit line glow -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow rings -->
  <circle cx="200" cy="165" r="130" fill="url(#shieldGlow)" opacity="0.4"/>
  <circle cx="200" cy="165" r="90" fill="url(#shieldGlow)" opacity="0.3"/>

  <!-- Platform/base glow -->
  <ellipse cx="200" cy="290" rx="120" ry="22" fill="url(#baseGlow)" opacity="0.8"/>

  <!-- ── Isometric Platform ─────────────────────────────────── -->
  <!-- Platform top face -->
  <polygon points="200,252 290,228 290,240 200,264" fill="#1a3560" opacity="0.9"/>
  <polygon points="200,252 110,228 110,240 200,264" fill="#0e2040" opacity="0.9"/>
  <polygon points="110,228 200,204 290,228 200,252" fill="url(#platformGrad)"/>
  <!-- Platform edge lines -->
  <polygon points="110,228 200,204 290,228 200,252" fill="none" stroke="#2a4a7a" stroke-width="0.75"/>

  <!-- ── Isometric Tower Body ───────────────────────────────── -->
  <!-- Front left face -->
  <polygon points="140,228 140,120 170,104 170,212" fill="url(#towerFrontFace)"/>
  <!-- Front right face -->
  <polygon points="260,228 260,120 230,104 230,212" fill="url(#towerSideFace)"/>
  <!-- Top face -->
  <polygon points="140,120 170,104 230,104 260,120 200,136" fill="url(#towerTopFace)"/>
  <!-- Central front face -->
  <polygon points="170,212 170,104 230,104 230,212 200,220" fill="#1a3060" opacity="0.85"/>

  <!-- Tower border highlights -->
  <line x1="140" y1="228" x2="140" y2="120" stroke="#2a4570" stroke-width="1"/>
  <line x1="260" y1="228" x2="260" y2="120" stroke="#1a3560" stroke-width="0.75"/>
  <line x1="140" y1="120" x2="170" y2="104" stroke="#3a5a8a" stroke-width="1"/>
  <line x1="260" y1="120" x2="230" y2="104" stroke="#2a4a7a" stroke-width="0.75"/>
  <line x1="170" y1="104" x2="230" y2="104" stroke="#3a5a8a" stroke-width="1"/>

  <!-- ── Battlements (crenellations) ───────────────────────── -->
  <!-- Front left face battlements -->
  <rect x="140" y="108" width="10" height="12" rx="1" fill="#1e3a6a"/>
  <rect x="154" y="108" width="10" height="12" rx="1" fill="#1e3a6a"/>

  <!-- Top face battlements -->
  <rect x="170" y="97" width="10" height="10" rx="1" fill="#2a4a7a"/>
  <rect x="185" y="97" width="10" height="10" rx="1" fill="#2a4a7a"/>
  <rect x="200" y="97" width="10" height="10" rx="1" fill="#2a4a7a"/>
  <rect x="215" y="97" width="10" height="10" rx="1" fill="#2a4a7a"/>

  <!-- Front right face battlements -->
  <rect x="246" y="108" width="10" height="12" rx="1" fill="#162d50"/>
  <rect x="260" y="108" width="10" height="12" rx="1" fill="#162d50"/>

  <!-- ── Tower Windows/Slots ────────────────────────────────── -->
  <!-- Front left -->
  <rect x="145" y="145" width="12" height="18" rx="2" fill="#06b6d4" opacity="0.15"/>
  <rect x="145" y="145" width="12" height="18" rx="2" fill="none" stroke="#06b6d4" stroke-width="0.75" opacity="0.4"/>
  <rect x="145" y="185" width="12" height="18" rx="2" fill="#06b6d4" opacity="0.1"/>
  <rect x="145" y="185" width="12" height="18" rx="2" fill="none" stroke="#06b6d4" stroke-width="0.75" opacity="0.3"/>

  <!-- Front right -->
  <rect x="243" y="145" width="12" height="18" rx="2" fill="#3b82f6" opacity="0.1"/>
  <rect x="243" y="145" width="12" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="0.75" opacity="0.3"/>
  <rect x="243" y="185" width="12" height="18" rx="2" fill="#3b82f6" opacity="0.08"/>
  <rect x="243" y="185" width="12" height="18" rx="2" fill="none" stroke="#3b82f6" stroke-width="0.75" opacity="0.25"/>

  <!-- ── Circuit Board Lines at Base ───────────────────────── -->
  <g opacity="0.5" filter="url(#glowFilter)">
    <!-- Left circuit lines -->
    <path d="M110 240 L80 250 L80 268 L60 268" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <circle cx="80" cy="268" r="2.5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="60" cy="268" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <path d="M110 234 L90 242 L90 258" stroke="#3b82f6" stroke-width="0.75" opacity="0.5"/>
    <circle cx="90" cy="258" r="2" fill="#3b82f6" opacity="0.6"/>

    <!-- Right circuit lines -->
    <path d="M290 240 L320 250 L320 268 L340 268" stroke="#06b6d4" stroke-width="1" opacity="0.6"/>
    <circle cx="320" cy="268" r="2.5" fill="#06b6d4" opacity="0.7"/>
    <circle cx="340" cy="268" r="1.5" fill="#06b6d4" opacity="0.5"/>
    <path d="M290 234 L310 242 L310 258" stroke="#3b82f6" stroke-width="0.75" opacity="0.5"/>
    <circle cx="310" cy="258" r="2" fill="#3b82f6" opacity="0.6"/>

    <!-- Bottom spread nodes -->
    <circle cx="150" cy="278" r="1.5" fill="#06b6d4" opacity="0.4"/>
    <circle cx="200" cy="282" r="2" fill="#06b6d4" opacity="0.5"/>
    <circle cx="250" cy="278" r="1.5" fill="#06b6d4" opacity="0.4"/>
    <line x1="150" y1="278" x2="200" y2="282" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
    <line x1="250" y1="278" x2="200" y2="282" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- ── Shield / Lock Icon (floating) ─────────────────────── -->
  <!-- Outer glow halo -->
  <circle cx="200" cy="68" r="40" fill="url(#shieldGlow)" opacity="0.6"/>
  <circle cx="200" cy="68" r="28" fill="url(#shieldGlow)" opacity="0.5"/>

  <!-- Shield shape -->
  <path d="M200 38 L224 48 L224 70 C224 86 212 96 200 100 C188 96 176 86 176 70 L176 48 Z"
        fill="url(#shieldGrad)" opacity="0.2" filter="url(#shieldFilter)"/>
  <path d="M200 38 L224 48 L224 70 C224 86 212 96 200 100 C188 96 176 86 176 70 L176 48 Z"
        fill="url(#shieldGrad)" opacity="0.15"/>
  <path d="M200 38 L224 48 L224 70 C224 86 212 96 200 100 C188 96 176 86 176 70 L176 48 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="1.5" opacity="0.9"/>

  <!-- Lock icon inside shield -->
  <rect x="192" y="64" width="16" height="14" rx="2" fill="none" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
  <path d="M195 64 L195 59 C195 55.7 197 53 200 53 C203 53 205 55.7 205 59 L205 64"
        fill="none" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>
  <circle cx="200" cy="71" r="2" fill="#06b6d4" opacity="0.9"/>
  <line x1="200" y1="73" x2="200" y2="76" stroke="#06b6d4" stroke-width="1.5" stroke-linecap="round" opacity="0.9"/>

  <!-- ── Floating data nodes ─────────────────────────────────── -->
  <!-- Left floating node -->
  <rect x="60" y="80" width="44" height="28" rx="6" fill="#111d35" stroke="#1e2d4a" stroke-width="1"/>
  <rect x="60" y="80" width="44" height="28" rx="6" fill="none" stroke="#06b6d4" stroke-width="0.75" opacity="0.3"/>
  <line x1="68" y1="90" x2="96" y2="90" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="68" y1="97" x2="88" y2="97" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <circle cx="100" cy="94" r="3" fill="#06b6d4" opacity="0.6"/>
  <!-- connector to tower -->
  <line x1="104" y1="94" x2="140" y2="140" stroke="#06b6d4" stroke-width="0.75" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- Right floating node -->
  <rect x="296" y="80" width="44" height="28" rx="6" fill="#111d35" stroke="#1e2d4a" stroke-width="1"/>
  <rect x="296" y="80" width="44" height="28" rx="6" fill="none" stroke="#3b82f6" stroke-width="0.75" opacity="0.3"/>
  <line x1="304" y1="90" x2="332" y2="90" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="304" y1="97" x2="324" y2="97" stroke="#94a3b8" stroke-width="1" opacity="0.3"/>
  <circle cx="336" cy="94" r="3" fill="#3b82f6" opacity="0.6"/>
  <!-- connector to tower -->
  <line x1="296" y1="94" x2="260" y2="140" stroke="#3b82f6" stroke-width="0.75" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- Top small node -->
  <rect x="172" y="12" width="56" height="20" rx="5" fill="#111d35" stroke="#1e2d4a" stroke-width="1"/>
  <rect x="172" y="12" width="56" height="20" rx="5" fill="none" stroke="#06b6d4" stroke-width="0.75" opacity="0.4"/>
  <line x1="180" y1="20" x2="220" y2="20" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="180" y1="26" x2="204" y2="26" stroke="#94a3b8" stroke-width="0.75" opacity="0.35"/>

  <!-- dot sparkles -->
  <circle cx="350" cy="130" r="1.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="340" cy="155" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="358" cy="165" r="2" fill="#06b6d4" opacity="0.35"/>
  <circle cx="50" cy="135" r="1.5" fill="#06b6d4" opacity="0.5"/>
  <circle cx="42" cy="160" r="1" fill="#3b82f6" opacity="0.4"/>
  <circle cx="55" cy="172" r="2" fill="#06b6d4" opacity="0.35"/>
</svg>
