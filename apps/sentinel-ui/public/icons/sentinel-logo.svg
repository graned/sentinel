<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="glow-lock" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-base" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="platform-glow" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Platform glow -->
  <ellipse cx="256" cy="430" rx="160" ry="20" fill="url(#platform-glow)"/>

  <!-- Tower base platform -->
  <rect x="136" y="400" width="240" height="18" rx="4" fill="#1a2d4a" stroke="#2a4a7a" stroke-width="1.5"/>

  <!-- Tower body -->
  <rect x="168" y="180" width="176" height="232" rx="10" fill="#1a2d4a" stroke="#2a4a7a" stroke-width="1.5"/>

  <!-- Tower body highlight (left edge) -->
  <rect x="168" y="180" width="6" height="232" rx="3" fill="#2a4a7a" opacity="0.5"/>

  <!-- Tower roof / battlement base -->
  <rect x="155" y="158" width="202" height="36" rx="5" fill="#1e3452" stroke="#2a4a7a" stroke-width="1.5"/>

  <!-- Battlements (crenellations) — 5 merlons -->
  <rect x="163" y="120" width="36" height="50" rx="4" fill="#1e3452" stroke="#2a4a7a" stroke-width="1.5"/>
  <rect x="217" y="120" width="36" height="50" rx="4" fill="#1e3452" stroke="#2a4a7a" stroke-width="1.5"/>
  <rect x="271" y="120" width="36" height="50" rx="4" fill="#1e3452" stroke="#2a4a7a" stroke-width="1.5"/>
  <rect x="313" y="120" width="36" height="50" rx="4" fill="#1e3452" stroke="#2a4a7a" stroke-width="1.5"/>

  <!-- Signal arcs above tower -->
  <path d="M 256 105 m -48 0 a 48 48 0 0 1 96 0" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 256 105 m -72 0 a 72 72 0 0 1 144 0" fill="none" stroke="#22D3EE" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <path d="M 256 105 m -96 0 a 96 96 0 0 1 192 0" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round" opacity="0.2"/>

  <!-- Signal dot -->
  <circle cx="256" cy="105" r="4" fill="#22D3EE" opacity="0.9"/>

  <!-- Lock glow halo -->
  <rect x="208" y="252" width="96" height="80" rx="12" fill="#22D3EE" opacity="0.15" filter="url(#glow-lock)"/>

  <!-- Lock body -->
  <rect x="214" y="258" width="84" height="74" rx="10" fill="#0d1f33" stroke="#22D3EE" stroke-width="2"/>

  <!-- Lock shackle (arc) -->
  <path d="M 234 258 L 234 235 a 22 22 0 0 1 44 0 L 278 258" fill="none" stroke="#22D3EE" stroke-width="5" stroke-linecap="round"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="288" r="11" fill="#22D3EE"/>

  <!-- Keyhole slot -->
  <rect x="251" y="293" width="10" height="18" rx="3" fill="#0d1f33"/>

  <!-- Keyhole circle inner dark -->
  <circle cx="256" cy="288" r="6" fill="#0d1f33"/>

  <!-- Steps at tower base -->
  <rect x="148" y="418" width="216" height="8" rx="3" fill="#142238" stroke="#2a4a7a" stroke-width="1"/>
  <rect x="160" y="426" width="192" height="8" rx="3" fill="#0f1c2e" stroke="#2a4a7a" stroke-width="1"/>
</svg>
