<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="favInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0B1120"/>

  <!-- Outer shield -->
  <path d="M16 2 L5 7 v9 c0,6.75 4.75,13.07 11.18,14.62 c6.43,-1.55 11.18,-7.87 11.18,-14.62 V7 Z"
        fill="url(#favInner)" stroke="url(#favGrad)" stroke-width="1.2"/>

  <!-- Inner shield highlight -->
  <path d="M16 5 L7.5 9 v7 c0,4.8 3.4,9.3 8.5,10.6 C21.1 25.3 24.5 20.8 24.5 16 V9 Z"
        fill="url(#favInner)" stroke="url(#favGrad)" stroke-width="0.7" stroke-opacity="0.4"/>

  <!-- Lock body -->
  <rect x="12" y="17" width="8" height="6.5" rx="1.5" fill="url(#favGrad)"/>

  <!-- Lock shackle -->
  <path d="M13.5 17 v-2.5 a2.5 2.5 0 0 1 5 0 v2.5"
        stroke="url(#favGrad)" stroke-width="1.3" stroke-linecap="round" fill="none"/>

  <!-- Keyhole -->
  <circle cx="16" cy="19.5" r="1.2" fill="#070d1a"/>
  <rect x="15.35" y="19.5" width="1.3" height="2.2" rx="0.5" fill="#070d1a"/>
</svg>
