<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pg" cx="50%" cy="100%" r="50%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="#0B1120"/>

  <!-- Platform glow -->
  <ellipse cx="96" cy="162" rx="60" ry="8" fill="url(#pg)"/>

  <!-- Tower base platform -->
  <rect x="50" y="150" width="92" height="7" rx="2" fill="#1a2d4a" stroke="#2a4a7a" stroke-width="0.8"/>

  <!-- Tower body -->
  <rect x="62" y="68" width="68" height="90" rx="5" fill="#1a2d4a" stroke="#2a4a7a" stroke-width="1"/>

  <!-- Battlement base -->
  <rect x="57" y="58" width="78" height="14" rx="3" fill="#1e3452" stroke="#2a4a7a" stroke-width="1"/>

  <!-- Battlements -->
  <rect x="59" y="42" width="14" height="20" rx="2.5" fill="#1e3452" stroke="#2a4a7a" stroke-width="1"/>
  <rect x="79" y="42" width="14" height="20" rx="2.5" fill="#1e3452" stroke="#2a4a7a" stroke-width="1"/>
  <rect x="99" y="42" width="14" height="20" rx="2.5" fill="#1e3452" stroke="#2a4a7a" stroke-width="1"/>
  <rect x="119" y="42" width="14" height="20" rx="2.5" fill="#1e3452" stroke="#2a4a7a" stroke-width="1"/>

  <!-- Signal arcs -->
  <path d="M 96 38 m -18 0 a 18 18 0 0 1 36 0" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <path d="M 96 38 m -28 0 a 28 28 0 0 1 56 0" fill="none" stroke="#22D3EE" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <path d="M 96 38 m -38 0 a 38 38 0 0 1 76 0" fill="none" stroke="#22D3EE" stroke-width="0.9" stroke-linecap="round" opacity="0.2"/>
  <circle cx="96" cy="38" r="2" fill="#22D3EE" opacity="0.9"/>

  <!-- Lock glow -->
  <rect x="76" y="96" width="40" height="34" rx="5" fill="#22D3EE" opacity="0.12" filter="url(#glow)"/>

  <!-- Lock body -->
  <rect x="79" y="99" width="34" height="30" rx="5" fill="#0d1f33" stroke="#22D3EE" stroke-width="1.2"/>

  <!-- Lock shackle -->
  <path d="M 87 99 L 87 88 a 9 9 0 0 1 18 0 L 105 99" fill="none" stroke="#22D3EE" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="96" cy="112" r="5" fill="#22D3EE"/>
  <circle cx="96" cy="112" r="2.5" fill="#0d1f33"/>
  <rect x="94.25" y="114" width="3.5" height="7" rx="1" fill="#0d1f33"/>
</svg>
