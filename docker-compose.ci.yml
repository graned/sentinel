services:
  # ── Database ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: sentinel_auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ci-network

  # ── Migrations ────────────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: apps/sentinel-core/Dockerfile.migrate
    command: sh -c "cd apps/sentinel-core && diesel migration run"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/sentinel_auth
    volumes:
      - ./apps/sentinel-core:/app/apps/sentinel-core
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ci-network
    restart: "no"

  # ── Application server ────────────────────────────────────────────────────
  # Compiles and starts the real HTTP server. The test-runner waits for the
  # /health endpoint to respond before running any tests.
  sentinel-core:
    build:
      context: .
      dockerfile: apps/sentinel-core/Dockerfile.dev
    command: cargo run --manifest-path apps/sentinel-core/Cargo.toml
    environment:
      - RUST_LOG=info
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/sentinel_auth
      - HEX_KEY=32a8c0fc962ce0299e8f5dedb1ff75b7e8789416db8f6836fb91c6e7bd2e58fe
      - CONFIG_ENCRYPTION_KEY=02b96ece27c893f176d52139c17ef97db53283a3b0a75e185c2a9da7c1855db5
      - RUST_BACKTRACE=1
      - OIDC_ISSUER_URL=http://sentinel-core:8000
      - FRONTEND_URL=http://localhost:3000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./apps/sentinel-core:/app/apps/sentinel-core
      - ./packages/sentinel-policy-engine:/app/packages/sentinel-policy-engine
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/app/target
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/api/system/health"]
      # start_period gives the initial cargo compile time before checks begin
      start_period: 180s
      interval: 10s
      timeout: 5s
      retries: 20
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - ci-network

  # ── Test runner ───────────────────────────────────────────────────────────
  # Runs only after sentinel-core is healthy. APP_HOST points at the server
  # container so get_server_url() in tests/common/setup.rs resolves correctly.
  test-runner:
    build:
      context: .
      dockerfile: apps/sentinel-core/Dockerfile.dev
    command: cargo test --workspace --locked
    environment:
      - RUST_LOG=info
      - APP_HOST=sentinel-core
      - APP_PORT=8000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/sentinel_auth
      - HEX_KEY=32a8c0fc962ce0299e8f5dedb1ff75b7e8789416db8f6836fb91c6e7bd2e58fe
      - CONFIG_ENCRYPTION_KEY=02b96ece27c893f176d52139c17ef97db53283a3b0a75e185c2a9da7c1855db5
      - RUST_BACKTRACE=1
      - OIDC_ISSUER_URL=http://sentinel-core:8000
      - FRONTEND_URL=http://localhost:3000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./Cargo.toml:/app/Cargo.toml:ro
      - ./Cargo.lock:/app/Cargo.lock:ro
      - ./apps/sentinel-core:/app/apps/sentinel-core
      - ./packages/sentinel-policy-engine:/app/packages/sentinel-policy-engine
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/app/target
    depends_on:
      sentinel-core:
        condition: service_healthy
    networks:
      - ci-network

volumes:
  cargo-cache:
  cargo-target:

networks:
  ci-network:
    driver: bridge
