[package]
name = "sentinel-policy-engine"
version = "0.1.0"
edition = "2024"
license = "AGPL-3.0-only"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
bincode = "1"
postcard = { version = "1", features = ["use-std"] }
tracing = "0.1"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "policy_engine"
harness = false
